name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm run build
      - run: gh release create "$GITHUB_REF_NAME" dist/trilium-todo.zip --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
